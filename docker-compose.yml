version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: skyhigh-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skyhigh}
      POSTGRES_USER: ${POSTGRES_USER:-skyhigh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skyhigh123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - skyhigh-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skyhigh} -d ${POSTGRES_DB:-skyhigh}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Redis (for seat map cache, rate limiting, optional distributed lock)
  redis:
    image: redis:7-alpine
    container_name: skyhigh-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - skyhigh-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # MockServer - optional HTTP proxy / recorder for external APIs (e.g. AviationStack)
  mockserver:
    image: mockserver/mockserver:latest
    container_name: skyhigh-mockserver
    ports:
      - "1080:1080"
    environment:
      MOCKSERVER_SERVER_PORT: 1080
    networks:
      - skyhigh-network
    restart: unless-stopped

  # Backend Spring Boot Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skyhigh-backend
    environment:
      SPRING_PROFILE: ${SPRING_PROFILE:-dev}
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-skyhigh}
      DATABASE_USERNAME: ${POSTGRES_USER:-skyhigh}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-skyhigh123}
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-change-this-in-production-please-make-it-long}
      SERVER_PORT: 8080
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost:80}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      # AviationStack configuration (API key + optional MockServer base URL override)
      AVIATIONSTACK_API_KEY: ${AVIATIONSTACK_API_KEY:-}
      AVIATIONSTACK_ENABLED: ${AVIATIONSTACK_ENABLED:-true}
      EXTERNAL_AVIATIONSTACK_BASE_URL: ${EXTERNAL_AVIATIONSTACK_BASE_URL:-http://mockserver:1080/v1} #http://api.aviationstack.com/v1}
      # WeatherAPI configuration (API key + optional MockServer base URL override)
      WEATHERAPI_API_KEY: ${WEATHERAPI_API_KEY:-}
      WEATHERAPI_ENABLED: ${WEATHERAPI_ENABLED:-true}
      EXTERNAL_WEATHERAPI_BASE_URL: ${EXTERNAL_WEATHERAPI_BASE_URL:-http://mockserver:1080/v1}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mockserver:
        condition: service_started
    networks:
      - skyhigh-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend React Application (Optional - for local testing)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    container_name: skyhigh-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - skyhigh-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  skyhigh-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
