spring:
  application:
    name: skyhigh-core

  profiles:
    active: ${SPRING_PROFILE:dev}

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/skyhigh}
    username: ${DATABASE_USERNAME:skyhigh}
    password: ${DATABASE_PASSWORD:skyhigh123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SkyHighHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=300s

  # Redis (optional - for seat map cache). When disabled, seat map reads fall back to DB.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 2000ms

  security:
    jwt:
      secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-please-make-it-long}
      expiration: 3600000 # 1 hour in milliseconds (3600000 ms)

# OpenAPI / Swagger UI - docs at http://localhost:8080/swagger-ui.html
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      cloudwatch:
        enabled: ${CLOUDWATCH_ENABLED:false}
        namespace: SkyHighCore
        batch-size: 20

logging:
  level:
    root: INFO
    com.skyhigh: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/skyhigh-core.log
    max-size: 10MB
    max-history: 30

notifications:
  enabled: true
  queueName: notifications:queue

external:
  aviationstack:
    api-key: ${AVIATIONSTACK_API_KEY:}
    base-url: ${EXTERNAL_AVIATIONSTACK_BASE_URL:http://api.aviationstack.com/v1}
    timeout: 5000
    enabled: ${AVIATIONSTACK_ENABLED:true}
  weatherapi:
    api-key: ${WEATHERAPI_API_KEY:}
    base-url: ${EXTERNAL_WEATHERAPI_BASE_URL:https://api.weatherapi.com/v1}
    timeout: 5000
    enabled: ${WEATHERAPI_ENABLED:true}

resilience4j:
  circuitbreaker:
    instances:
      aviationstack:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60000
        sliding-window-size: 10
        minimum-number-of-calls: 5
  retry:
    instances:
      aviationstack:
        max-attempts: 3
        wait-duration: 1000
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

app:
  redis:
    seat-map-cache-enabled: ${REDIS_SEAT_MAP_CACHE_ENABLED:true}
    seat-map-cache-ttl-seconds: 30 # TTL for seat map cache entries (5-30s balances freshness vs load; 30s meets P95 < 1s)
    # Distributed seat lock: enable when running multiple backend instances to avoid duplicate seat assignments.
    # Requires Redis (spring.data.redis.*). When disabled or Redis unavailable, reservation uses only DB optimistic locking.
    distributed-seat-lock-enabled: ${REDIS_DISTRIBUTED_SEAT_LOCK_ENABLED:false}
    seat-lock-ttl-seconds: 10 # Lock TTL (5-15s); avoids deadlock if a node crashes while holding the lock.
  seat-hold-duration: 120 # seconds
  seat-release-job-interval: 5000 # milliseconds (5 seconds)
  seat-expiration-batch-size: 100 # maximum seats to process per run
  seat-expiration-retry-attempts: 3 # number of retry attempts on failure
  baggage:
    max-weight: 25 # kg (free baggage allowance)
    excess-fee-per-kg: 1 # USD per kg (excess baggage charge)
  payment:
    mock-success-rate: 0.95 # 95% success rate for mock payments
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  rate-limit:
    seat-map:
      enabled: ${SEATMAP_RATE_LIMIT_ENABLED:true}
      window-seconds: 2       # window size for counting seat-map accesses
      threshold: 50           # maximum allowed seat-map requests per source within the window
      block-seconds: 120      # how long to block abusive sources (in seconds)
