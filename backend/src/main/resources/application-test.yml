spring:
  datasource:
    url: jdbc:h2:mem:skyhigh-test;MODE=PostgreSQL;DATABASE_TO_UPPER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
  security:
    jwt:
      secret: test-secret-key-for-jwt-token-generation-must-be-at-least-512-bits-long-for-hs512-algorithm
      expiration: 86400000

logging:
  level:
    root: WARN
    com.skyhigh: DEBUG

app:
  rate-limit:
    seat-map:
      enabled: false

