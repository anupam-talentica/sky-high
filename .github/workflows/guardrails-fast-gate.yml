name: "Guardrails – Fast Gate"

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 of the two-stage guardrails pipeline (Section 14).
#
# Goal  : block a PR within ~2 minutes if critical issues are present.
# Scope : Checkstyle always runs full-project; Semgrep scopes to changed Java
#         files (or full backend/src if no Java diff is detected).
# Tools : Checkstyle (Java style, via Maven) + Semgrep (security/arch patterns)
# Action: fails the PR check on severity=ERROR findings; warnings are ignored
#         here (they are picked up by the companion issue-bot workflow).
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches:
      - main
      - develop
    # No paths filter — gate runs on every PR so it cannot be silently bypassed
    # by only changing workflow/config files.

concurrency:
  group: guardrails-fast-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fast-gate:
    name: "Fast Gate (Checkstyle + Semgrep)"
    runs-on: ubuntu-latest
    timeout-minutes: 10           # hard ceiling — gate must never stall CI

    permissions:
      contents: read
      pull-requests: write        # to post an inline PR comment on failure
      security-events: write      # required for upload-sarif
      issues: write               # to create copilot-fixable Issues inline

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout PR branch (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed for accurate diff against base

      # ── 2. Log changed Java files (informational only) ───────────────────
      # Semgrep always scans the full source tree, so this is for run logging
      # only — it does not gate whether Semgrep runs.
      - name: Compute changed Java files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          FILES=$(git diff --name-only "$BASE" "$HEAD" | grep '\.java$' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed Java files: ${FILES:-<none>}"

      # ── 3. Set up Java (cached) ───────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # ── 4. Checkstyle (errors only, always full-project) ─────────────────
      # Runs against the whole backend so style regressions in ANY file are
      # caught regardless of which files were changed in the PR.
      - name: Run Checkstyle (error-level findings block the PR)
        id: checkstyle
        working-directory: ./backend
        run: |
          mvn --no-transfer-progress checkstyle:check \
            -Dcheckstyle.violationSeverity=error \
            -Dcheckstyle.outputFile=target/checkstyle-result.xml \
            -Dcheckstyle.consoleOutput=true
        continue-on-error: true   # capture exit code; we decide below

      # ── 5. Upload Checkstyle artefact (for issue-bot) ─────────────────────
      - name: Upload Checkstyle XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-result
          path: backend/target/checkstyle-result.xml
          retention-days: 3
          if-no-files-found: ignore

      # ── 6. Install Semgrep ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: pip install semgrep --quiet

      # ── 7. Semgrep full scan (errors only) ───────────────────────────────
      # Always scans the full backend/src/main/java so that pre-existing ERROR
      # findings in unchanged files are caught on every PR — not just when the
      # file containing the issue happens to be in the diff.
      # --error exits non-zero on any ERROR-severity finding.
      - name: Run Semgrep (error-level findings block the PR)
        id: semgrep
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}   # optional: enables Semgrep Cloud
        run: |
          semgrep \
            --config .semgrep/skyhigh.yml \
            --error \
            --severity ERROR \
            --sarif \
            --output semgrep-results.sarif \
            backend/src/main/java
        continue-on-error: true   # capture exit code; we decide below

      # ── 8. Upload Semgrep SARIF to GitHub Code Scanning ──────────────────
      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep-fast-gate
        continue-on-error: true   # don't fail if SARIF is empty

      # ── 9. Upload Semgrep SARIF artefact (for issue-bot) ─────────────────
      - name: Upload Semgrep SARIF artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.sarif
          retention-days: 3
          if-no-files-found: ignore

      # ── 10. Post PR comment on failure ────────────────────────────────────
      - name: Post failure comment on PR
        if: steps.checkstyle.outcome == 'failure' || steps.semgrep.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const checkstyleFailed = '${{ steps.checkstyle.outcome }}' === 'failure';
            const semgrepFailed    = '${{ steps.semgrep.outcome }}'    === 'failure';
            const tools = [
              checkstyleFailed ? '**Checkstyle**' : null,
              semgrepFailed    ? '**Semgrep**'    : null,
            ].filter(Boolean).join(' and ');

            const body = `## ❌ Fast Gate blocked this PR

            ${tools} found **critical (ERROR-level) issues** in the changed files.

            **How to fix quickly with Copilot:**
            1. Open the _Actions_ tab → click this run → expand the failing step to see exact violations.
            2. For each violation, open the file in VS Code and use:
               \`@workspace fix the [tool] violation in [File] line [N]\`
            3. Push the fix — the gate re-runs automatically.

            _Non-blocking warnings will be filed as \`copilot-fixable\` Issues by the companion bot._`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # ── 11. Debug: list files present for issue creation ─────────────────
      - name: Debug – list artefact files
        if: always()
        run: |
          echo "=== Semgrep SARIF ==="
          ls -lh semgrep-results.sarif 2>/dev/null || echo "semgrep-results.sarif NOT FOUND"
          cat semgrep-results.sarif 2>/dev/null | head -30 || true
          echo "=== Checkstyle XML ==="
          ls -lh backend/target/checkstyle-result.xml 2>/dev/null || echo "checkstyle-result.xml NOT FOUND"

      # ── 12. Create copilot-fixable Issues from ERROR findings ─────────────
      # Embedded here (not in companion issue-bot) because workflow_run events
      # only fire for workflows on the default branch.
      - name: Create copilot-fixable Issues from findings
        if: always()
        continue-on-error: true   # never let issue creation block the gate result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const LABEL    = 'copilot-fixable';
            const prNumber = context.issue.number || context.payload.pull_request?.number || '?';
            const shortSha = '${{ github.event.pull_request.head.sha }}'.slice(0, 7);

            async function ensureLabel() {
              try { await github.rest.issues.getLabel({ owner, repo, name: LABEL }); }
              catch {
                await github.rest.issues.createLabel({
                  owner, repo, name: LABEL,
                  color: '0075ca',
                  description: 'Fixable with GitHub Copilot Chat in under a minute',
                });
              }
            }

            async function createIssueIfNew(title, body) {
              const { data: existing } = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', labels: LABEL, per_page: 100,
              });
              if (existing.find(i => i.title === title)) {
                console.log(`Skipping duplicate: ${title}`); return;
              }
              const { data } = await github.rest.issues.create({ owner, repo, title, body, labels: [LABEL] });
              console.log(`Created issue #${data.number}: ${title}`);
            }

            await ensureLabel();

            // ── Checkstyle XML — ERROR severity only ──────────────────────
            const checkstyleFile = 'backend/target/checkstyle-result.xml';
            console.log(`Checkstyle file exists: ${fs.existsSync(checkstyleFile)}`);
            if (fs.existsSync(checkstyleFile)) {
              const xml      = fs.readFileSync(checkstyleFile, 'utf8');
              console.log(`Checkstyle XML length: ${xml.length}`);
              const fileRe   = /<file name="([^"]+)">([\s\S]*?)<\/file>/g;
              const errorRe  = /<error\s[^>]*severity="error"[^>]*>/gi;
              const attrRe   = /(\w+)="([^"]*)"/g;
              let fileMatch;
              while ((fileMatch = fileRe.exec(xml)) !== null) {
                const filePath    = fileMatch[1];
                const fileBlock   = fileMatch[2];
                const shortFile   = filePath.replace(/.*\/src\/main\/java\//, '').replace(/\//g, '.');
                const simpleClass = shortFile.split('.').pop();
                const javaFile    = shortFile.replace(/\./g, '/') + '.java';
                errorRe.lastIndex = 0;
                let errMatch;
                while ((errMatch = errorRe.exec(fileBlock)) !== null) {
                  const attrs = {};
                  attrRe.lastIndex = 0;
                  let a;
                  while ((a = attrRe.exec(errMatch[0])) !== null) attrs[a[1]] = a[2];
                  const line    = attrs.line    || '?';
                  const message = attrs.message || 'Checkstyle violation';
                  const source  = (attrs.source || '').split('.').pop();
                  const title   = `[Checkstyle] ${source} in ${simpleClass} line ${line}`;
                  const body    = `## Checkstyle ERROR — \`${source}\`\n\n> 🔴 ERROR — this finding **blocked the PR**\n\n**File:** \`${javaFile}\`\n**Line:** ${line}\n**Message:** ${message}\n\n---\n\n### Fix with Copilot Chat\n\n\`\`\`\n@workspace Fix the Checkstyle violation in ${simpleClass} line ${line}: ${message}\n\`\`\`\n\n---\n_Auto-filed by Guardrails Fast Gate from PR #${prNumber} (${shortSha})_`;
                  await createIssueIfNew(title, body);
                }
              }
              console.log('Checkstyle parsing complete.');
            }

            // ── Semgrep SARIF — ERROR level only ──────────────────────────
            const semgrepFile = 'semgrep-results.sarif';
            console.log(`Semgrep SARIF exists: ${fs.existsSync(semgrepFile)}`);
            if (fs.existsSync(semgrepFile)) {
              const raw = fs.readFileSync(semgrepFile, 'utf8').trim();
              console.log(`Semgrep SARIF length: ${raw.length}`);
              if (raw && raw !== '{}') {
                const sarif = JSON.parse(raw);
                for (const run of (sarif.runs || [])) {
                  const rules = Object.fromEntries((run.tool?.driver?.rules || []).map(r => [r.id, r]));
                  console.log(`Semgrep results count: ${(run.results || []).length}`);
                  for (const result of (run.results || [])) {
                    const ruleId = result.ruleId || 'unknown-rule';
                    const rule   = rules[ruleId] || {};
                    // result.level is often absent in Semgrep SARIF — fall back
                    // to the rule's defaultConfiguration.level
                    const level  = (
                      result.level ||
                      rule.defaultConfiguration?.level ||
                      'warning'
                    ).toLowerCase();
                    console.log(`  result: ${ruleId} level=${level}`);
                    if (level !== 'error') continue;
                    const message     = result.message?.text || rule.shortDescription?.text || ruleId;
                    const location    = result.locations?.[0]?.physicalLocation;
                    const filePath    = location?.artifactLocation?.uri || 'unknown-file';
                    const line        = location?.region?.startLine || '?';
                    const shortFile   = filePath.replace(/.*\/src\/main\/java\//, '');
                    const simpleClass = shortFile.replace(/\.java$/, '').split('/').pop();
                    const copilotPrompt = rule.properties?.copilot_prompt
                      || `@workspace Fix the Semgrep finding '${ruleId}' in ${simpleClass} line ${line}`;
                    const title = `[Semgrep] ${ruleId} in ${simpleClass} line ${line}`;
                    const body  = `## Semgrep ERROR — \`${ruleId}\`\n\n> 🔴 ERROR — this finding **blocked the PR**\n\n**File:** \`${shortFile}\`\n**Line:** ${line}\n**Message:** ${message}\n\n---\n\n### Fix with Copilot Chat\n\n\`\`\`\n${copilotPrompt}\n\`\`\`\n\n---\n_Auto-filed by Guardrails Fast Gate from PR #${prNumber} (${shortSha})_`;
                    await createIssueIfNew(title, body);
                  }
                }
              }
              console.log('Semgrep parsing complete.');
            }
            console.log('Issue creation complete.');

      # ── 13. Fail the job if either tool found blocking issues ─────────────
      - name: Enforce gate result
        if: steps.checkstyle.outcome == 'failure' || steps.semgrep.outcome == 'failure'
        run: |
          echo "Fast Gate FAILED — critical issues must be resolved before merge."
          exit 1
