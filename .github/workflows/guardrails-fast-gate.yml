name: "Guardrails – Fast Gate"

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 of the two-stage guardrails pipeline (Section 14).
#
# Goal  : block a PR within ~2 minutes if critical issues are present.
# Scope : Checkstyle always runs full-project; Semgrep scopes to changed Java
#         files (or full backend/src if no Java diff is detected).
# Tools : Checkstyle (Java style, via Maven) + Semgrep (security/arch patterns)
# Action: fails the PR check on severity=ERROR findings; warnings are ignored
#         here (they are picked up by the companion issue-bot workflow).
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches:
      - main
      - develop
    # No paths filter — gate runs on every PR so it cannot be silently bypassed
    # by only changing workflow/config files.

concurrency:
  group: guardrails-fast-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fast-gate:
    name: "Fast Gate (Checkstyle + Semgrep)"
    runs-on: ubuntu-latest
    timeout-minutes: 10           # hard ceiling — gate must never stall CI

    permissions:
      contents: read
      pull-requests: write        # to post an inline PR comment on failure
      security-events: write      # required for upload-sarif
      issues: write               # to create copilot-fixable Issues inline

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout PR branch (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed for accurate diff against base

      # ── 2. Log changed Java files (informational only) ───────────────────
      # Semgrep always scans the full source tree, so this is for run logging
      # only — it does not gate whether Semgrep runs.
      - name: Compute changed Java files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          FILES=$(git diff --name-only "$BASE" "$HEAD" | grep '\.java$' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "Changed Java files: ${FILES:-<none>}"

      # ── 3. Set up Java (cached) ───────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # ── 4. Checkstyle (errors only, always full-project) ─────────────────
      # Runs against the whole backend so style regressions in ANY file are
      # caught regardless of which files were changed in the PR.
      - name: Run Checkstyle (error-level findings block the PR)
        id: checkstyle
        working-directory: ./backend
        run: |
          mvn --no-transfer-progress checkstyle:check \
            -Dcheckstyle.violationSeverity=error \
            -Dcheckstyle.outputFile=target/checkstyle-result.xml \
            -Dcheckstyle.consoleOutput=true
        continue-on-error: true   # capture exit code; we decide below

      # ── 5. Upload Checkstyle artefact (for issue-bot) ─────────────────────
      - name: Upload Checkstyle XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-result
          path: backend/target/checkstyle-result.xml
          retention-days: 3
          if-no-files-found: ignore

      # ── 6. Install Semgrep ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: pip install semgrep --quiet

      # ── 7. Semgrep full scan (errors only) ───────────────────────────────
      # Always scans the full backend/src/main/java so that pre-existing ERROR
      # findings in unchanged files are caught on every PR — not just when the
      # file containing the issue happens to be in the diff.
      # --error exits non-zero on any ERROR-severity finding.
      - name: Run Semgrep (error-level findings block the PR)
        id: semgrep
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}   # optional: enables Semgrep Cloud
        run: |
          semgrep \
            --config .semgrep/skyhigh.yml \
            --error \
            --severity ERROR \
            --sarif \
            --output semgrep-results.sarif \
            backend/src/main/java
        continue-on-error: true   # capture exit code; we decide below

      # ── 8. Upload Semgrep SARIF to GitHub Code Scanning ──────────────────
      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep-fast-gate
        continue-on-error: true   # don't fail if SARIF is empty

      # ── 9. Upload Semgrep SARIF artefact (for issue-bot) ─────────────────
      - name: Upload Semgrep SARIF artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.sarif
          retention-days: 3
          if-no-files-found: ignore

      # ── 10. Post PR comment on failure ────────────────────────────────────
      - name: Post failure comment on PR
        if: steps.checkstyle.outcome == 'failure' || steps.semgrep.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const checkstyleFailed = '${{ steps.checkstyle.outcome }}' === 'failure';
            const semgrepFailed    = '${{ steps.semgrep.outcome }}'    === 'failure';
            const tools = [
              checkstyleFailed ? '**Checkstyle**' : null,
              semgrepFailed    ? '**Semgrep**'    : null,
            ].filter(Boolean).join(' and ');

            const body = `## ❌ Fast Gate blocked this PR

            ${tools} found **critical (ERROR-level) issues** in the changed files.

            **How to fix quickly with Copilot:**
            1. Open the _Actions_ tab → click this run → expand the failing step to see exact violations.
            2. For each violation, open the file in VS Code and use:
               \`@workspace fix the [tool] violation in [File] line [N]\`
            3. Push the fix — the gate re-runs automatically.

            _Non-blocking warnings will be filed as \`copilot-fixable\` Issues by the companion bot._`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # ── 11. Parse findings into issues.json ──────────────────────────────
      # Use Python (already installed) to parse SARIF/XML into a simple JSON
      # list so the github-script step has clean, pre-processed input.
      - name: Parse findings into issues.json
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, re, os, xml.etree.ElementTree as ET

          findings = []

          # ── Semgrep SARIF ──────────────────────────────────────────────
          sarif_path = 'semgrep-results.sarif'
          if os.path.exists(sarif_path):
            with open(sarif_path) as f:
              sarif = json.load(f)
            for run in sarif.get('runs', []):
              rules = {r['id']: r for r in run.get('tool', {}).get('driver', {}).get('rules', [])}
              for result in run.get('results', []):
                rule_id = result.get('ruleId', 'unknown')
                rule    = rules.get(rule_id, {})
                level   = (result.get('level') or
                           rule.get('defaultConfiguration', {}).get('level', 'warning')).lower()
                print(f'  Semgrep result: {rule_id} level={level}')
                if level != 'error':
                  continue
                loc       = (result.get('locations') or [{}])[0].get('physicalLocation', {})
                file_uri  = loc.get('artifactLocation', {}).get('uri', 'unknown')
                line      = loc.get('region', {}).get('startLine', '?')
                short     = re.sub(r'.*/src/main/java/', '', file_uri)
                cls       = short.replace('.java', '').split('/')[-1]
                message   = result.get('message', {}).get('text', rule_id).strip()
                prompt    = (rule.get('properties') or {}).get('copilot_prompt') or \
                            f"@workspace Fix the Semgrep finding '{rule_id}' in {cls} line {line}"
                findings.append({
                  'title': f'[Semgrep] {rule_id} in {cls} line {line}',
                  'body':  f'## Semgrep ERROR — `{rule_id}`\n\n> 🔴 ERROR — this finding **blocked the PR**\n\n**File:** `{short}`\n**Line:** {line}\n**Message:** {message}\n\n---\n\n### Fix with Copilot Chat\n\n```\n{prompt}\n```\n'
                })
            print(f'Semgrep: {len(findings)} ERROR findings')
          else:
            print('semgrep-results.sarif not found')

          # ── Checkstyle XML ─────────────────────────────────────────────
          cs_path = 'backend/target/checkstyle-result.xml'
          cs_count = 0
          if os.path.exists(cs_path):
            tree = ET.parse(cs_path)
            for file_el in tree.getroot().findall('file'):
              file_path = file_el.get('name', '')
              short     = re.sub(r'.*/src/main/java/', '', file_path).replace('/', '.')
              cls       = short.split('.')[-1] if '.' in short else short
              java_file = short.replace('.', '/') + '.java'
              for err in file_el.findall('error'):
                if (err.get('severity') or '').lower() != 'error':
                  continue
                line    = err.get('line', '?')
                message = err.get('message', 'Checkstyle violation')
                source  = (err.get('source') or '').split('.')[-1]
                findings.append({
                  'title': f'[Checkstyle] {source} in {cls} line {line}',
                  'body':  f'## Checkstyle ERROR — `{source}`\n\n> 🔴 ERROR — this finding **blocked the PR**\n\n**File:** `{java_file}`\n**Line:** {line}\n**Message:** {message}\n\n---\n\n### Fix with Copilot Chat\n\n```\n@workspace Fix the Checkstyle violation in {cls} line {line}: {message}\n```\n'
                })
                cs_count += 1
            print(f'Checkstyle: {cs_count} ERROR findings')
          else:
            print('checkstyle-result.xml not found')

          with open('issues-to-create.json', 'w') as f:
            json.dump(findings, f)
          print(f'Total findings to file as issues: {len(findings)}')
          PYEOF

      # ── 12. Create copilot-fixable Issues from issues.json ────────────────
      - name: Create copilot-fixable Issues from findings
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const LABEL    = 'copilot-fixable';
            const prNumber = context.issue.number || '?';
            const shortSha = '${{ github.event.pull_request.head.sha }}'.slice(0, 7);

            if (!fs.existsSync('issues-to-create.json')) {
              console.log('issues-to-create.json not found — nothing to file');
              return;
            }
            const findings = JSON.parse(fs.readFileSync('issues-to-create.json', 'utf8'));
            console.log(`Findings to create issues for: ${findings.length}`);
            if (findings.length === 0) return;

            try { await github.rest.issues.getLabel({ owner, repo, name: LABEL }); }
            catch {
              await github.rest.issues.createLabel({
                owner, repo, name: LABEL, color: '0075ca',
                description: 'Fixable with GitHub Copilot Chat in under a minute',
              });
            }

            const { data: existing } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: LABEL, per_page: 100,
            });
            const existingTitles = new Set(existing.map(i => i.title));

            for (const f of findings) {
              if (existingTitles.has(f.title)) {
                console.log(`Skipping duplicate: ${f.title}`); continue;
              }
              const body = f.body + `\n_Auto-filed by Guardrails Fast Gate from PR #${prNumber} (${shortSha})_`;
              const { data } = await github.rest.issues.create({ owner, repo, title: f.title, body, labels: [LABEL] });
              console.log(`Created issue #${data.number}: ${f.title}`);
            }
            console.log('Issue creation complete.');

      # ── 13. Fail the job if either tool found blocking issues ─────────────
      - name: Enforce gate result
        if: steps.checkstyle.outcome == 'failure' || steps.semgrep.outcome == 'failure'
        run: |
          echo "Fast Gate FAILED — critical issues must be resolved before merge."
          exit 1
